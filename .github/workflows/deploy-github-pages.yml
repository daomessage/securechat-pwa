name: Deploy to GitHub Pages

# 用户 fork 后这个 workflow 自动启用. push 到 main 或手工触发就部署到 GitHub Pages.
#
# 用户操作:
#   1. Fork 这个仓库到自己 GitHub
#   2. 仓库 Settings → Pages → Source 选 "GitHub Actions"
#   3. 等这个 workflow 跑完 (~2 分钟)
#   4. 访问 https://<你的用户名>.github.io/securechat-pwa/
#
# 手工触发: Actions tab → Deploy to GitHub Pages → Run workflow

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages base path)
        env:
          # Vite 读取这个 env 作为 base path
          # GITHUB_REPOSITORY 格式 "owner/repo", 取 /repo 部分作为子路径
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          echo "Building with VITE_BASE=$VITE_BASE"
          npm run build

      - name: SPA fallback for GitHub Pages
        # GitHub Pages 不支持 rewrite 规则, 用 404.html 技巧实现 SPA fallback
        # 任何未匹配路径 → 返回 404.html → 内容和 index.html 一样 → React Router 接管
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
