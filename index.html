<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <!-- viewport-fit=cover 让 env(safe-area-inset-*) 在 iOS 刘海机型上生效 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Metadata -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#09090b" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DAO Message" />
    <!-- 防止 iOS 自动把看起来像电话号码的数字变成可点链接 -->
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS 主屏幕图标(苹果只吃 180px) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />

    <!-- iOS Splash Screens(启动画面)
         通用 fallback:512×512。生产建议用 pwa-asset-generator 生成 iPhone/iPad 各尺寸:
             npx pwa-asset-generator ./logo.svg ./public/splash \
                 --background "#09090b" --splash-only
         按 media query 匹配设备宽度 × DPR,这里只给出代表尺寸示例: -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" />

    <!-- SEO & Description -->
    <meta name="description" content="零知识端对端加密通讯，基于 DAO MESSAGE 协议。完全由用户掌控的去中心化通讯应用。" />
    <title>DAO Message - E2EE 通讯</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
